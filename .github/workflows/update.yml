# Stabilized workflow: reduced test set and concurrency, longer timeouts, no git push

name: Ultimate VPN Subscriber (Stabilized)

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Massive Fetch & Filter (Stabilized)
        shell: bash
        run: |
          set -euo pipefail

          echo "⏳ 启动大规模抓取（稳健模式）..."
          TMP=$(mktemp -d)
          cd "$TMP"
          > raw.txt

          SOURCES=(
            "https://raw.githubusercontent.com/Au1rxx/free-vpn-subscriptions/main/v2ray.txt"
            "https://raw.githubusercontent.com/Ruk1ng001/freeSub/main/v2ray"
            "https://raw.githubusercontent.com/victorgeel/keybot/main/subscription/working_keys.txt"
            "https://raw.githubusercontent.com/miladtahanian/Config-Collector/main/mixed_iran.txt"
            "https://raw.githubusercontent.com/mahdibland/ShadowsocksAggregator/master/Eternity.txt"
            "https://raw.githubusercontent.com/pojiezhiyuanjun/freev2/master/0811.txt"
            "https://raw.githubusercontent.com/aiboboxx/v2rayfree/main/v2ray"
            "https://raw.githubusercontent.com/adiwzx/freenode/main/ssr/v2ray"
            "https://raw.githubusercontent.com/ermaozi/get_subscribe/main/subscribe/v2ray.txt"
            "https://raw.githubusercontent.com/freefq/free/master/v2ray"
            "https://raw.githubusercontent.com/barry-far/V2ray-Configs/main/All_Configs_Sub.txt"
            "https://raw.githubusercontent.com/Leon406/SubCrawler/master/sub/share/v2ray.txt"
            "https://raw.githubusercontent.com/Pawdroid/Free-servers/main/sub"
            "https://raw.githubusercontent.com/ripaojiedian/freenode/main/v2ray"
            "https://raw.githubusercontent.com/colatiger/v2ray-nodes/master/v2ray.txt"
            "https://raw.githubusercontent.com/Azumi67/Random-VPN/main/v2ray.txt"
            "https://raw.githubusercontent.com/yebekhe/TelegramV2rayCollector/main/subs/v2ray"
            "https://raw.githubusercontent.com/alanbobs999/TopFreeProxies/master/Eternity"
            "https://raw.githubusercontent.com/linhlinhlinh/v2ray/master/v2ray.txt"
          )

          for url in "${SOURCES[@]}"; do
            echo "⬇️  抓取: $url"
            content=$(curl -sL --connect-timeout 15 "$url" 2>/dev/null | gunzip -c 2>/dev/null || curl -sL --connect-timeout 15 "$url" 2>/dev/null || true)
            if [ -z "${content:-}" ]; then
              echo "   ⚠️  空或失败，跳过"
              continue
            fi
            echo "$content" | grep -Eo '(vmess|vless|trojan|ss)://[^[:space:]]+' >> raw.txt 2>/dev/null || true
            echo "   ✅ 成功"
          done

          sort -u raw.txt -o uniq.txt || true
          total=$(wc -l < uniq.txt || echo 0)
          echo "📊 去重后总节点数: ${total}"

          if [ "${total}" -eq 0 ]; then
            echo "No nodes available." > ../sub.txt
            cd ..
            rm -rf "$TMP"
            exit 0
          fi

          # reduced test size to speed up and increase stability
          N=150
          head -n "${N}" uniq.txt > to_test.txt

          echo "🔍 开始智能解析 + 连通性检测（并发 5，超时 3s）..."
          > ok.txt

          detect() {
            node="$1"
            host=""
            port=""

            if [[ "$node" =~ ^([a-zA-Z0-9]+)://(.+)$ ]]; then
              scheme="${BASH_REMATCH[1]}"
              payload="${BASH_REMATCH[2]}"
            else
              return 1
            fi

            if [ "$scheme" = "vmess" ]; then
              if [[ "$payload" =~ @([^:\/]+):([0-9]+)$ ]] || [[ "$payload" =~ ([^:\/]+):([0-9]+)$ ]]; then
                host="${BASH_REMATCH[1]}"; port="${BASH_REMATCH[2]}"
              else
                safe=$(echo "$payload" | tr '_-' '+/')
                pad=$(( 4 - (${#safe} % 4) ))
                if [ $pad -lt 4 ]; then safe="${safe}$(printf '=%.0s' $(seq 1 $pad))"; fi
                decoded=$(echo "$safe" | base64 -d 2>/dev/null || true)
                if [ -n "${decoded:-}" ]; then
                  host=$(echo "$decoded" | python3 -c "import sys,json
try:
  j=json.load(sys.stdin)
  print(j.get('add') or j.get('address') or j.get('host') or '')
except:
  pass" 2>/dev/null || true)
                  port=$(echo "$decoded" | python3 -c "import sys,json
try:
  j=json.load(sys.stdin)
  print(j.get('port') or '')
except:
  pass" 2>/dev/null || true)
                fi
              fi

            elif [ "$scheme" = "ss" ]; then
              if echo "$payload" | grep -q '@'; then
                if [[ "$payload" =~ @([^:]+):([0-9]+)$ ]]; then
                  host="${BASH_REMATCH[1]}"; port="${BASH_REMATCH[2]}"
                fi
              else
                safe=$(echo "$payload" | tr '_-' '+/')
                pad=$(( 4 - (${#safe} % 4) ))
                if [ $pad -lt 4 ]; then safe="${safe}$(printf '=%.0s' $(seq 1 $pad))"; fi
                decoded=$(echo "$safe" | base64 -d 2>/dev/null || true)
                if [[ "${decoded:-}" =~ @([^:]+):([0-9]+)$ ]]; then
                  host="${BASH_REMATCH[1]}"; port="${BASH_REMATCH[2]}"
                elif [[ "${decoded:-}" =~ ([^:\/]+):([0-9]+)$ ]]; then
                  host="${BASH_REMATCH[1]}"; port="${BASH_REMATCH[2]}"
                fi
              fi

            else
              if [[ "$payload" =~ ^([^@]+@)?([^:\/]+):([0-9]+) ]]; then
                host="${BASH_REMATCH[2]}"; port="${BASH_REMATCH[3]}"
              fi
            fi

            if [ -n "${host:-}" ] && [ -n "${port:-}" ]; then
              if timeout 3 bash -c "echo >/dev/tcp/${host}/${port}" 2>/dev/null; then
                echo "$node"
              fi
            fi
          }
          export -f detect

          # reduced concurrency to avoid network issues
          cat to_test.txt | xargs -P 5 -I {} bash -c 'detect "$@"' _ {} > ok.txt 2>/dev/null || true

          available=$(wc -l < ok.txt || echo 0)
          echo "✅ 通过检测的可用节点数: ${available}"

          echo "ok.txt size: $(wc -c < ok.txt || echo 0) bytes"
          echo "first 10 lines of ok.txt (decoded view):"
          head -n 10 ok.txt || true

          if [ "${available}" -gt 0 ]; then
            base64 -w 0 ok.txt > ../sub.txt
            echo "🎉 使用 ${available} 个经过检测的节点"
          else
            echo "⚠️ 无节点通过检测，使用去重后的前 100 条作为回退"
            head -n 100 uniq.txt > fallback.txt
            base64 -w 0 fallback.txt > ../sub.txt
          fi

          cd ..
          rm -rf "$TMP"
          echo "✅ 订阅生成完成。"

      - name: Upload debug artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vpn-sub-debug
          path: |
            sub.txt
            ok.txt
            uniq.txt

      # Note: Commit & Push removed to avoid failures due to branch protections or GITHUB_TOKEN restrictions.
